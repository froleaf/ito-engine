  {
    "id": "hw_mitochondrial_flexibility",
    "type": "KnowledgeNode",
    "userInsight": "从小运动的人可能把线粒体功能养得特别好——自己从小参加长跑和爬山，虽然后来10年几乎没运动，但每次想运动减脂都很快见效。发育期的线粒体健康是长期资产。恢复运动早期消耗葡萄糖而非脂肪，并不意味着没用——是在修复线粒体。",
    "depth": "有独立见解",
    "nodeRole": "knowledge",
    "name": "线粒体代谢灵活性 (Metabolic Flexibility)",
    "description": "线粒体是细胞内将脂肪和葡萄糖转化为能量的细胞器。代谢灵活性指身体在脂肪氧化和葡萄糖氧化之间灵活切换的能力。职业运动员在高强度运动时仍能主要燃烧脂肪（代谢灵活），代谢综合征患者从第一步起就几乎完全依赖葡萄糖（代谢不灵活）。长期不运动导致线粒体功能退化，恢复运动早期先修复线粒体功能（数月），之后有氧运动才能高效燃脂。",
    "domain": "domain_health_wellness"
  },

    "description": "核心论点：被低估的不是图数据库技术，而是'对象+带属性的边'这个数据建模范式。AI提供了两个之前缺失的条件：世界知识作为现成的术语骨架（学科体系经高校规模化已产生统一的标签体系/术语表），以及自动化的实体构建能力。关键区分：大部分AI时代的垂直场景（教育、内容、笔记、项目管理）需要的是图的schema表达力（边有类型、属性、方向），不是图的计算力（遍历、PageRank、社区发现）。因此实现层应是轻量的JSON-LD文件而非重型图数据库——更轻、AI可直接读写、不需要额外基础设施。ITO Engine是这个范式的第一个落地实例。图范式的两条核心理念：①连接本身和对象一样重要，边是一等公民②一旦切入边的概念，信息复杂性超越二维关系结构的承载能力。",

// ============================================================
const priorityColors = { primary: "#3b82f6", foundation: "#22c55e", supplementary: "#64748b" };
const depthColors = { "浅读": "#fde68a", "理解": "#fbbf24", "有独立见解": "#f59e0b", "可教授他人": "#d97706" };
const typeConfig = {
  DomainRoot:          { radius: 20, color: null, stroke: "none", strokeWidth: 0 },
  Branch:              { radius: 10, color: null, stroke: "none", strokeWidth: 0 },
  BranchScaffold:      { radius: 10, color: null, stroke: "none", strokeWidth: 0 },
  KnowledgeNode:       { radius: 12, color: null, stroke: "#fff", strokeWidth: 1.5 },
  Material:            { radius: 8,  color: "#60a5fa", stroke: "none", strokeWidth: 0 },
  KnowledgeDeposit:    { radius: 10, color: "#34d399", stroke: "#fff", strokeWidth: 1 },
  ThinkingDeposit:     { radius: 10, color: "#fbbf24", stroke: "#fff", strokeWidth: 1 },
  CrossDomainLink:     { radius: 8,  color: "#a855f7", stroke: "#c084fc", strokeWidth: 1.5 },
  MisconceptionPattern:{ radius: 6,  color: "#ef4444", stroke: "none", strokeWidth: 0 },
  ThinkingScript:      { radius: 10, color: "#f472b6", stroke: "#fff", strokeWidth: 1 },
};

const linkStyles = {
  subBranch:       { stroke: "#4b5563", dasharray: null, opacity: 0.6, width: 1 },
  parentBranch:    { stroke: "#4b5563", dasharray: null, opacity: 0.6, width: 1 },
  belongsTo:       { stroke: "#6b7280", dasharray: null, opacity: 0.4, width: 0.8 },
  isA:             { stroke: "#6b7280", dasharray: null, opacity: 0.4, width: 0.8 },
  relatedTo:       { stroke: "#9ca3af", dasharray: "4,3", opacity: 0.3, width: 0.8 },
  prerequisite:    { stroke: "#9ca3af", dasharray: "4,3", opacity: 0.3, width: 0.8 },
  refersTo:        { stroke: "#f59e0b", dasharray: "6,3", opacity: 0.5, width: 1 },
  derivedFrom:     { stroke: "#eab308", dasharray: "4,4", opacity: 0.4, width: 1 },
  inspiredBy:      { stroke: "#eab308", dasharray: "4,4", opacity: 0.4, width: 1 },
  crossDomainLink: { stroke: "#a855f7", dasharray: "6,3", opacity: 0.6, width: 1.5 },
  hasResource:     { stroke: "#60a5fa", dasharray: "4,3", opacity: 0.4, width: 0.8 },
  coversTopics:    { stroke: "#60a5fa", dasharray: "4,3", opacity: 0.4, width: 0.8 },
  aboutNodes:      { stroke: "#34d399", dasharray: "4,3", opacity: 0.4, width: 0.8 },
  aboutDomains:    { stroke: "#34d399", dasharray: "4,3", opacity: 0.4, width: 0.8 },
  hasMisconception:{ stroke: "#ef4444", dasharray: "3,3", opacity: 0.3, width: 0.8 },
  confusedWith:    { stroke: "#ef4444", dasharray: "3,3", opacity: 0.3, width: 0.8 },
};

// ============================================================
// BUILD GRAPH from graphNodes / graphLinks (injected by script)
// ============================================================
const nodeMap = {};
const nodes = [];
const links = [];

// Find domain colors map
const domainColorMap = {};
graphNodes.filter(n => n.type === "DomainRoot").forEach(n => {
  domainColorMap[n.id] = priorityColors[n.priority] || "#64748b";
});

// Process nodes
graphNodes.forEach(n => {
  const cfg = typeConfig[n.type] || typeConfig.KnowledgeNode;
  const node = {
    id: n.id, name: n.name, description: n.description,
    type: n.type, domain: n.domain || null,
    depth: n.depth, nodeRole: n.nodeRole, userInsight: n.userInsight,
    outputStatus: n.outputStatus, outputPotential: n.outputPotential,
    readingStatus: n.readingStatus, progress: n.progress,
    priority: n.priority,
    radius: cfg.radius,
    strokeColor: cfg.stroke,
    strokeWidth: cfg.strokeWidth,
  };

  // Determine color
  if (n.type === "DomainRoot") {
    node.color = priorityColors[n.priority] || "#64748b";
  } else if (n.type === "Branch" || n.type === "BranchScaffold") {
    const parentColor = domainColorMap[n.domain] || "#64748b";
    node.color = d3.color(parentColor).brighter(0.8).toString();
  } else if (n.type === "KnowledgeNode") {
    node.color = depthColors[n.depth] || "#f59e0b";
  } else {
    node.color = cfg.color;
  }

  nodeMap[n.id] = node;
  nodes.push(node);
});

// Process links
graphLinks.forEach(l => {
  if (nodeMap[l.source] && nodeMap[l.target]) {
    links.push({ source: l.source, target: l.target, type: l.type });
  }
});

// Update stats
const domainCount = graphNodes.filter(n => n.type === "DomainRoot").length;
const knowledgeCount = graphNodes.filter(n => n.type === "KnowledgeNode").length;
const depositCount = graphNodes.filter(n => n.type === "KnowledgeDeposit" || n.type === "ThinkingDeposit").length;
const crossLinkCount = graphNodes.filter(n => n.type === "CrossDomainLink").length;
let statsText = `${domainCount} 个领域`;
if (knowledgeCount) statsText += ` · ${knowledgeCount} 个知识节点`;
if (depositCount) statsText += ` · ${depositCount} 个沉淀产出`;
if (crossLinkCount) statsText += ` · ${crossLinkCount} 个跨域连接`;
document.getElementById("stats").textContent = statsText;

// ============================================================
// FILTER STATE
// ============================================================
const filterState = { types: new Set(), domains: new Set() };
let selectedNode = null;

// Gather unique types present in data
const typeFilterDefs = [
  { key: "DomainRoot", label: "领域根节点", color: "#3b82f6" },
  { key: "Branch,BranchScaffold", label: "领域分支", color: "#94a3b8" },
  { key: "KnowledgeNode", label: "知识节点", color: "#f59e0b" },
  { key: "Material", label: "学习材料", color: "#60a5fa" },
  { key: "KnowledgeDeposit", label: "知识沉淀", color: "#34d399" },
  { key: "ThinkingDeposit", label: "思考沉淀", color: "#fbbf24" },
  { key: "CrossDomainLink", label: "跨域连接", color: "#a855f7" },
  { key: "ThinkingScript", label: "思维脚本", color: "#f472b6" },
  { key: "MisconceptionPattern", label: "歧义模式", color: "#ef4444" },
];

// Init type filters - all enabled
typeFilterDefs.forEach(t => t.key.split(",").forEach(k => filterState.types.add(k)));

// Build type filter checkboxes
const typeContainer = document.getElementById("type-filters");
typeFilterDefs.forEach(t => {
  // Only show if at least one node of this type exists
  const keys = t.key.split(",");
  if (!nodes.some(n => keys.includes(n.type))) return;

  const label = document.createElement("label");
  label.className = "filter-item";
  label.innerHTML = `<input type="checkbox" checked data-filter-type="${t.key}"><span class="check-box"></span><span class="dot" style="background:${t.color}"></span><span>${t.label}</span>`;
  label.querySelector("input").addEventListener("change", function() {
    const keys = this.dataset.filterType.split(",");
    keys.forEach(k => this.checked ? filterState.types.add(k) : filterState.types.delete(k));
    applyVisualState();
  });
  typeContainer.appendChild(label);
});

// All domains always visible (no domain filter UI)
graphNodes.filter(n => n.type === "DomainRoot").forEach(n => filterState.domains.add(n.id));

// ============================================================
// VISIBILITY LOGIC
// ============================================================
function isNodeVisible(n) {
  // Check type filter
  if (!filterState.types.has(n.type)) return false;
  // Check domain filter - DomainRoot checks itself, others check their domain
  if (n.type === "DomainRoot") {
    if (!filterState.domains.has(n.id)) return false;
  } else if (n.domain) {
    if (!filterState.domains.has(n.domain)) return false;
  }
  // CrossDomainLink: visible if at least one linked domain is visible (always show if no domain set)
  return true;
}

function getConnectedSet(nodeId) {
  const connected = new Set();
  connected.add(nodeId);
  links.forEach(l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    if (sid === nodeId) connected.add(tid);
    if (tid === nodeId) connected.add(sid);
  });
  return connected;
}

function applyVisualState() {
  const connected = selectedNode ? getConnectedSet(selectedNode.id) : null;

  node.select("circle:last-of-type").attr("opacity", n => {
    if (!isNodeVisible(n)) return 0.03;
    if (connected && !connected.has(n.id)) return 0.12;
    return 0.9;
  });
  node.select("text").attr("opacity", n => {
    if (!isNodeVisible(n)) return 0.03;
    if (connected && !connected.has(n.id)) return 0.08;
    return 1;
  });
  // Glow circles for domain roots
  node.select("circle:first-of-type").filter(function(d) {
    return d.type === "DomainRoot" && this !== node.filter(dd => dd.id === d.id).select("circle:last-of-type").node();
  }).attr("opacity", n => {
    if (!isNodeVisible(n)) return 0;
    if (connected && !connected.has(n.id)) return 0.03;
    return 0.15;
  });
  // Selection ring
  node.select(".select-ring").attr("opacity", n => (selectedNode && n.id === selectedNode.id) ? 1 : 0);

  link.attr("stroke-opacity", l => {
    const sid = typeof l.source === "object" ? l.source.id : l.source;
    const tid = typeof l.target === "object" ? l.target.id : l.target;
    const sNode = nodeMap[sid], tNode = nodeMap[tid];
    if (!isNodeVisible(sNode) || !isNodeVisible(tNode)) return 0.02;
    if (connected) {
      return (sid === selectedNode.id || tid === selectedNode.id) ? 0.9 : 0.03;
    }
    return (linkStyles[l.type] || linkStyles.relatedTo).opacity;
  });
}

// ============================================================
// D3 FORCE SIMULATION
// ============================================================
const width = window.innerWidth;
const height = window.innerHeight;

const svg = d3.select("body").append("svg")
  .attr("width", width)
  .attr("height", height);

const defs = svg.append("defs");
// Arrow markers
Object.entries(linkStyles).forEach(([type, style]) => {
  defs.append("marker")
    .attr("id", `arrow-${type}`)
    .attr("viewBox", "0 -4 8 8")
    .attr("refX", 12).attr("refY", 0)
    .attr("markerWidth", 6).attr("markerHeight", 6)
    .attr("orient", "auto")
    .append("path")
    .attr("d", "M0,-4L8,0L0,4")
    .attr("fill", style.stroke);
});

const g = svg.append("g");

// Zoom
const zoom = d3.zoom()
  .scaleExtent([0.2, 5])
  .on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

// Click on empty canvas to deselect
svg.on("click", (e) => {
  if (e.target.tagName === "svg" || e.target === svg.node()) {
    selectedNode = null;
    applyVisualState();
  }
});

// Compute domain centers for clustering
const domainRoots = nodes.filter(n => n.type === "DomainRoot");
const angleStep = (2 * Math.PI) / Math.max(domainRoots.length, 1);
const clusterRadius = Math.min(width, height) * 0.32;
const domainCenters = {};
domainRoots.forEach((d, i) => {
  const angle = angleStep * i - Math.PI / 2;
  domainCenters[d.id] = { x: width / 2 + clusterRadius * Math.cos(angle), y: height / 2 + clusterRadius * Math.sin(angle) };
});

const simulation = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d => d.id).distance(d => {
    if (d.type === "subBranch" || d.type === "parentBranch") return 60;
    if (d.type === "crossDomainLink") return 200;
    return 100;
  }).strength(d => {
    if (d.type === "subBranch" || d.type === "parentBranch") return 0.8;
    if (d.type === "crossDomainLink") return 0.1;
    return 0.3;
  }))
  .force("charge", d3.forceManyBody().strength(d => d.type === "DomainRoot" ? -400 : -120))
  .force("center", d3.forceCenter(width / 2, height / 2).strength(0.05))
  .force("collision", d3.forceCollide().radius(d => d.radius + 4))
  .force("cluster", alpha => {
    nodes.forEach(n => {
      const center = domainCenters[n.domain];
      if (center) {
        const k = alpha * 0.3;
        n.vx += (center.x - n.x) * k;
        n.vy += (center.y - n.y) * k;
      }
    });
  });

// Draw links
const link = g.append("g")
  .selectAll("line")
  .data(links)
  .join("line")
  .attr("stroke", d => (linkStyles[d.type] || linkStyles.relatedTo).stroke)
  .attr("stroke-width", d => (linkStyles[d.type] || linkStyles.relatedTo).width)
  .attr("stroke-dasharray", d => (linkStyles[d.type] || linkStyles.relatedTo).dasharray)
  .attr("stroke-opacity", d => (linkStyles[d.type] || linkStyles.relatedTo).opacity)
  .attr("marker-end", d => (d.type !== "subBranch" && d.type !== "parentBranch") ? `url(#arrow-${d.type})` : null);

// Draw nodes
const node = g.append("g")
  .selectAll("g")
  .data(nodes)
  .join("g")
  .call(d3.drag()
    .on("start", (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
    .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
    .on("end", (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
  );

// Glow for domain roots
node.filter(d => d.type === "DomainRoot").append("circle")
  .attr("r", d => d.radius + 6)
  .attr("fill", d => d.color)
  .attr("opacity", 0.15);

// Selection ring (hidden by default)
node.append("circle")
  .attr("class", "select-ring")
  .attr("r", d => d.radius + 4)
  .attr("fill", "none")
  .attr("stroke", "#fff")
  .attr("stroke-width", 2)
  .attr("opacity", 0);

node.append("circle")
  .attr("r", d => d.radius)
  .attr("fill", d => d.color)
  .attr("stroke", d => d.strokeColor)
  .attr("stroke-width", d => d.strokeWidth)
  .attr("opacity", 0.9);

// Labels
node.append("text")
  .text(d => d.name)
  .attr("dy", d => d.radius + 14)
  .attr("text-anchor", "middle")
  .attr("fill", d => d.type === "DomainRoot" ? "#e8ecf4" : "#94a3b8")
  .attr("font-size", d => d.type === "DomainRoot" ? 13 : 10)
  .attr("font-weight", d => d.type === "DomainRoot" ? 600 : 400)
  .attr("paint-order", "stroke")
  .attr("stroke", "#0a0e17")
  .attr("stroke-width", 3);

// Tooltip & interaction
const tooltip = d3.select("#tooltip");
const typeLabels = {
  DomainRoot: "领域根节点", Branch: "领域分支", BranchScaffold: "领域分支（骨架）",
  KnowledgeNode: "知识节点", Material: "学习材料",
  KnowledgeDeposit: "知识沉淀", ThinkingDeposit: "思考沉淀",
  CrossDomainLink: "跨域连接", ThinkingScript: "思维脚本", MisconceptionPattern: "歧义模式"
};
const roleLabels = { knowledge: "知识", mental_model: "心智模型", methodology: "方法论", skill: "技能" };
const statusLabels = { deposited: "已沉淀", published: "已发布" };

// Hover: tooltip only (no opacity change when a node is selected)
node.on("mouseenter", (e, d) => {
  let html = `<div class="tt-name">${d.name}</div>`;
  html += `<div class="tt-type">${typeLabels[d.type] || d.type}</div>`;
  if (d.description) html += `<div class="tt-desc">${d.description}</div>`;
  if (d.depth) html += `<div class="tt-depth">深度：${d.depth}</div>`;
  if (d.nodeRole) html += `<div class="tt-role">角色：${roleLabels[d.nodeRole] || d.nodeRole}</div>`;
  if (d.userInsight) html += `<div class="tt-insight">${d.userInsight}</div>`;
  if (d.outputStatus) html += `<div class="tt-status">状态：${statusLabels[d.outputStatus] || d.outputStatus}</div>`;
  if (d.outputPotential) html += `<div class="tt-role">输出潜力：${d.outputPotential}</div>`;
  const readingLabels = { in_progress: "在读", completed: "已读完", paused: "暂停", abandoned: "已放弃" };
  if (d.readingStatus) html += `<div class="tt-status">阅读状态：${readingLabels[d.readingStatus] || d.readingStatus}</div>`;
  if (d.progress) html += `<div class="tt-role">进度：${d.progress}</div>`;
  if (d.scenarioTags && d.scenarioTags.length) html += `<div class="tt-role">适用场景：${d.scenarioTags.join("、")}</div>`;
  tooltip.html(html).style("opacity", 1);

  // If no node is selected, do hover-highlight
  if (!selectedNode) {
    const connected = getConnectedSet(d.id);
    node.select("circle:last-of-type").attr("opacity", n => {
      if (!isNodeVisible(n)) return 0.03;
      return connected.has(n.id) ? 1 : 0.15;
    });
    node.select("text").attr("opacity", n => {
      if (!isNodeVisible(n)) return 0.03;
      return connected.has(n.id) ? 1 : 0.15;
    });
    link.attr("stroke-opacity", l => {
      const sid = typeof l.source === "object" ? l.source.id : l.source;
      const tid = typeof l.target === "object" ? l.target.id : l.target;
      if (!isNodeVisible(nodeMap[sid]) || !isNodeVisible(nodeMap[tid])) return 0.02;
      return (sid === d.id || tid === d.id) ? 0.9 : 0.05;
    });
  }
})
.on("mousemove", e => {
  tooltip.style("left", (e.pageX + 16) + "px").style("top", (e.pageY - 10) + "px");
})
.on("mouseleave", () => {
  tooltip.style("opacity", 0);
  // If no node is selected, restore normal state
  if (!selectedNode) {
    applyVisualState();
  }
});

// Click: toggle selection
node.on("click", (e, d) => {
  e.stopPropagation();
  if (selectedNode && selectedNode.id === d.id) {
    selectedNode = null;
  } else {
    selectedNode = d;
  }
  applyVisualState();
});

// Tick
simulation.on("tick", () => {
  link
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  node.attr("transform", d => `translate(${d.x},${d.y})`);
});

// Initial zoom to fit
setTimeout(() => {
  const bounds = g.node().getBBox();
  const fullWidth = bounds.width, fullHeight = bounds.height;
  if (fullWidth === 0 || fullHeight === 0) return;
  const midX = bounds.x + fullWidth / 2, midY = bounds.y + fullHeight / 2;
  const scale = 0.85 / Math.max(fullWidth / width, fullHeight / height);
  const transform = d3.zoomIdentity
    .translate(width / 2 - midX * scale, height / 2 - midY * scale)
    .scale(scale);
  svg.transition().duration(800).call(zoom.transform, transform);
}, 2000);
</script>
</body>
</html>
